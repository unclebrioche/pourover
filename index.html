<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a1510">
<title>Pour Over</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1510'/%3E%3Cpath d='M8 10h14l-2 12H10L8 10z' fill='none' stroke='%23f5f0e8' stroke-width='1.5' stroke-linejoin='round'/%3E%3Cpath d='M22 13h2a2 2 0 0 1 0 4h-2' fill='none' stroke='%23f5f0e8' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M12 7c0-1 1-1.5 1-2.5' fill='none' stroke='%23c0622a' stroke-width='1.5' stroke-linecap='round'/%3E%3Cpath d='M16 7c0-1 1-1.5 1-2.5' fill='none' stroke='%23c0622a' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --ink: #1a1510;
    --mid: #6b5c4a;
    --accent: #c0622a;
    --rule: #d4c9b8;
    --card: #ede8de;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  /* ── STICKY TIMER BLOCK ── */
  .timer-block {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--ink);
    color: var(--bg);
    padding: 14px 16px 12px;
    /* cap width on desktop, center it */
    width: 100%;
  }

  .timer-inner {
    max-width: 480px;
    margin: 0 auto;
  }

  /* big timer row — 6 equal columns, height locked to timer */
  .timer-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    align-items: stretch;
    margin-bottom: 6px;
    height: clamp(2.4rem, 11vw, 4rem);
    overflow: hidden;
  }

  .timer-display {
    grid-column: 1 / 3;
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 11vw, 4rem);
    font-weight: 400;
    letter-spacing: -0.04em;
    line-height: 1;
    transition: color 0.25s;
    white-space: nowrap;
    align-self: center;
  }

  .timer-display.cue { color: var(--accent); }

  .timer-spacer { grid-column: 3 / 5; }

  /* col 5: name tight above grams, both pinned to top */
  .timer-step-info {
    grid-column: 5 / 6;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-start;
    padding-bottom: 1px;
    min-width: 0;
    overflow: hidden;
  }

  .tsi-name {
    font-size: 0.56rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.5);
    font-weight: 500;
    white-space: nowrap;
    line-height: 1.2;
  }

  .tsi-target {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 6vw, 2.2rem);
    color: var(--accent);
    letter-spacing: -0.04em;
    line-height: 1;
    white-space: nowrap;
  }

  .tsi-unit {
    font-size: 0.52rem;
    color: rgba(245,240,232,0.4);
    margin-left: 2px;
    font-family: 'DM Mono', monospace;
    vertical-align: middle;
  }

  /* col 6: next tight above pips+status, both pinned to bottom */
  .timer-right-info {
    grid-column: 6 / 7;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-start;
    padding-bottom: 1px;
    min-width: 0;
    overflow: hidden;
  }

  .tsi-next {
    font-size: 0.5rem;
    color: rgba(245,240,232,0.32);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    line-height: 1.3;
    white-space: normal;
    word-break: break-word;
    margin-bottom: 2px;
  }

  .timer-label {
    font-size: 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
    transition: color 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .timer-label.lit { color: var(--accent); }

  .step-pip {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .step-pip-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(245,240,232,0.2);
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .step-pip-dot.done { background: var(--accent); opacity: 0.6; }
  .step-pip-dot.active { background: var(--bg); }

  /* progress bar */
  .progress-track {
    position: relative;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: visible;
    margin-bottom: 10px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 1s linear;
    border-radius: 2px;
    position: relative;
    z-index: 1;
  }

  .progress-target-line {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 10px;
    background: rgba(245,240,232,0.35);
    border-radius: 1px;
    z-index: 2;
    transform: translateX(-50%);
  }

  .step-marker {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(245,240,232,0.25);
    border: 1.5px solid rgba(245,240,232,0.15);
    z-index: 3;
    transition: background 0.3s, border-color 0.3s;
  }

  .step-marker.reached {
    background: var(--accent);
    border-color: var(--accent);
  }

  .step-marker.current {
    background: var(--bg);
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(192,98,42,0.3);
  }

  /* 2×2 grid: [Start] [Reset] / [Hot] [Iced] */
  .timer-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 7px;
  }

  .timer-grid button {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    padding: 10px 8px;
    min-height: 42px;
    transition: opacity 0.15s, background 0.15s;
  }

  #btn-start {
    background: var(--accent);
    color: var(--bg);
    border: 1.5px solid var(--accent);
  }

  #btn-start:active { opacity: 0.75; }

  #btn-reset {
    background: transparent;
    color: rgba(245,240,232,0.5);
    border: 1.5px solid rgba(245,240,232,0.18);
  }

  #btn-reset:active { background: rgba(255,255,255,0.07); }

  .mode-btn-grid {
    background: transparent;
    color: rgba(245,240,232,0.45);
    border: 1.5px solid rgba(245,240,232,0.12);
  }

  .mode-btn-grid.active {
    background: rgba(245,240,232,0.1);
    color: var(--bg);
    border-color: rgba(245,240,232,0.3);
  }

  .mode-btn-grid:active { opacity: 0.7; }

  .scroll-body {
    padding: 12px 14px max(20px, env(safe-area-inset-bottom));
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── TWO-COL ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: start; }

  /* ── CALLOUTS ── */
  .callouts { display: flex; flex-direction: column; gap: 6px; }

  .callout {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 8px 10px; background: var(--card); border-radius: 4px;
  }

  .callout.primary { background: var(--ink); color: var(--bg); }
  .callout-label { font-size: 0.52rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.55; }
  .callout-value { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 400; letter-spacing: -0.02em; }
  .callout-unit { font-size: 0.52rem; opacity: 0.5; margin-left: 2px; }

  /* ── SETTINGS ── */
  .settings-heading {
    font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--mid); margin: 12px 0 5px;
  }
  .settings-heading:first-child { margin-top: 0; }

  /* coffee quick presets */
  .coffee-presets { display: flex; gap: 5px; margin-bottom: 6px; }

  .preset-btn {
    flex: 1; padding: 6px 4px; font-family: 'DM Mono', monospace; font-size: 0.64rem;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
    border: 1px solid var(--rule); border-radius: 3px; background: var(--card);
    color: var(--mid); transition: all 0.12s; min-height: 34px;
  }

  .preset-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .preset-btn:active { opacity: 0.7; }

  /* setting row */
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 0; border-bottom: 1px solid var(--rule);
  }

  .setting-row:first-of-type { border-top: 1px solid var(--rule); }

  .setting-label {
    font-size: 0.55rem; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--mid); flex: 1; padding-right: 6px; white-space: nowrap;
  }

  /* ── HORIZONTAL SWIPE ROLLER ── */
  .roller-wrap {
    position: relative;
    /* width fills available space in setting-row */
    width: 110px;
    height: 34px;
    flex-shrink: 0;
    cursor: ew-resize;
    user-select: none;
    -webkit-user-select: none;
  }

  /* visible track */
  .roller-track-outer {
    position: absolute;
    inset: 0;
    overflow: hidden;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: var(--bg);
  }

  .roller-fade-l, .roller-fade-r {
    position: absolute; top: 0; bottom: 0; width: 18px; pointer-events: none; z-index: 2;
  }

  .roller-fade-l { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
  .roller-fade-r { right: 0; background: linear-gradient(to left, var(--bg), transparent); }

  .roller-center-mark {
    position: absolute; top: 5px; bottom: 5px; left: 50%; transform: translateX(-50%);
    width: 1px; background: var(--rule); pointer-events: none; z-index: 1;
  }

  .roller-track {
    position: absolute; top: 0; bottom: 0;
    display: flex; align-items: center;
    will-change: transform;
  }

  .roller-item {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 0.78rem;
    color: var(--mid); line-height: 1;
  }

  .roller-item.sel {
    color: var(--ink); font-weight: 500;
  }

  /* ── STEPS ── */
  .section-label { font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mid); margin-bottom: 7px; }

  .steps { display: flex; flex-direction: column; }
  .step { border-top: 1px solid var(--rule); }
  .step:last-of-type { border-bottom: 1px solid var(--rule); }

  .step-header { display: flex; align-items: center; gap: 7px; padding: 9px 0; }
  .step-title { flex: 1; font-size: 0.7rem; color: var(--ink); transition: color 0.2s; }
  .step-badge { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--ink); transition: color 0.2s; letter-spacing: -0.01em; }
  .step-time-badge { font-size: 0.65rem; color: var(--mid); white-space: nowrap; min-width: 26px; text-align: right; transition: color 0.2s; font-weight: 500; }

  .step-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
  .step-body-inner { overflow: hidden; }
  .step-body-pad { padding: 2px 0 11px; }
  .step-note { font-size: 0.62rem; color: var(--mid); line-height: 1.55; }

  .step.active { border-top: 2px solid var(--accent); }
  .step.active .step-body { grid-template-rows: 1fr; }
  .step.active .step-title { font-weight: 500; }
  .step.active .step-badge {
    color: var(--accent);
    font-size: 1.9rem;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .step.active .step-time-badge { color: var(--accent); }
  .step.done .step-title, .step.done .step-badge, .step.done .step-time-badge { opacity: 0.28; }

  .ice-note {
    font-size: 0.6rem; color: var(--mid); margin-top: 8px; padding: 7px 9px;
    background: var(--card); border-radius: 4px; border-left: 2px solid var(--rule);
  }
  /* ── RECIPE BAR (bottom of timer block) ── */
  .recipe-bar {
    border-top: 1px solid rgba(245,240,232,0.08);
    margin-top: 10px;
    padding: 7px 0 0;
  }

  .recipe-bar-label {
    font-size: 0.48rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.28);
    margin-bottom: 5px;
  }

  .chip-strip {
    display: flex;
    align-items: center;
    gap: 5px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 10px;
  }
  .chip-strip::-webkit-scrollbar { display: none; }

  .recipe-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 8px;
    border-radius: 20px;
    border: 1px solid rgba(245,240,232,0.12);
    background: rgba(245,240,232,0.05);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.12s;
    flex-shrink: 0;
    min-height: 26px;
  }

  .recipe-chip:active { background: rgba(245,240,232,0.12); }

  .recipe-chip.active {
    background: var(--accent);
    border-color: var(--accent);
  }

  .chip-name {
    font-size: 0.56rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.5);
    transition: color 0.12s;
  }

  .recipe-chip.active .chip-name { color: var(--bg); }

  .chip-del {
    font-size: 0.48rem;
    color: rgba(245,240,232,0.3);
    margin-left: 1px;
    line-height: 1;
    padding: 0 1px;
    transition: color 0.12s;
  }

  .recipe-chip.active .chip-del { color: rgba(245,240,232,0.6); }

  .chip-add {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 4px 8px;
    border-radius: 20px;
    border: 1px dashed rgba(245,240,232,0.15);
    background: transparent;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    min-height: 26px;
    transition: all 0.12s;
  }

  .chip-add:active { background: rgba(245,240,232,0.07); }

  .chip-add-label {
    font-size: 0.54rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.3);
  }

  .chip-save-row {
    display: flex; gap: 7px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.22s ease, padding 0.22s ease;
    padding: 0;
  }

  .chip-save-row.open {
    max-height: 50px;
    padding-bottom: 10px;
  }

  .chip-input {
    flex: 1; padding: 7px 10px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    border: 1px solid rgba(245,240,232,0.18); border-radius: 3px;
    background: rgba(245,240,232,0.07); color: var(--bg); outline: none;
    min-height: 34px;
  }

  .chip-input::placeholder { color: rgba(245,240,232,0.22); }
  .chip-input:focus { border-color: rgba(245,240,232,0.35); }

  .chip-confirm {
    padding: 7px 14px; font-family: 'DM Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; border-radius: 3px; min-height: 34px;
    background: var(--accent); color: var(--bg); border: 1.5px solid var(--accent);
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- STICKY TIMER -->
<div class="timer-block">
  <div class="timer-inner">
    <div class="timer-row">
      <div class="timer-display" id="timer">0:00</div>
      <div class="timer-spacer"></div>
      <div class="timer-step-info" id="timer-step-info"></div>
      <div class="timer-right-info">
        <div class="tsi-next" id="tsi-next-line"></div>
        <div class="timer-label" id="timer-label">
          <div class="step-pip" id="step-pip"></div>
          <span id="timer-label-text">ready</span>
        </div>
      </div>
    </div>
    <div class="progress-track" id="progress-track">
      <div class="progress-fill" id="progress"></div>
    </div>
    <div class="timer-grid">
      <button id="btn-start">Start</button>
      <button id="btn-reset">Reset</button>
      <button class="mode-btn-grid active" id="btn-hot" onclick="setMode('hot')">☕ Hot</button>
      <button class="mode-btn-grid" id="btn-iced" onclick="setMode('iced')">🧊 Iced</button>
    </div>
  </div>

  <!-- RECIPE BAR -->
  <div class="recipe-bar">
    <div style="max-width:480px;margin:0 auto;">
      <div class="recipe-bar-label">My recipes</div>
      <div class="chip-strip" id="chip-strip">
        <button class="chip-add" id="chip-add" onclick="toggleChipSave()">
          <span class="chip-add-label">+ save</span>
        </button>
      </div>
      <div class="chip-save-row" id="chip-save-row">
        <input class="chip-input" id="chip-input" type="text" placeholder="Name this recipe…" maxlength="40" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="chip-confirm" onclick="saveChipPreset()">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="scroll-body">
  <div class="two-col">

    <!-- LEFT: callouts + settings -->
    <div>
      <p class="section-label">Totals</p>
      <div class="callouts">
        <div class="callout primary">
          <span class="callout-label" id="callout-main-label">Total water</span>
          <span><span class="callout-value" id="total-water">300</span><span class="callout-unit">g</span></span>
        </div>
        <div class="callout" id="callout-ice" style="display:none;">
          <span class="callout-label">Ice</span>
          <span><span class="callout-value" id="ice-amount">—</span><span class="callout-unit">g</span></span>
        </div>
        <div class="callout">
          <span class="callout-label">Target</span>
          <span class="callout-value" id="target-display">3:30</span>
        </div>
      </div>

      <p class="settings-heading" style="margin-top:12px;">Recipe</p>

      <div class="coffee-presets">
        <button class="preset-btn active" id="preset-20" onclick="setCoffeePreset(20)">20g</button>
        <button class="preset-btn" id="preset-30" onclick="setCoffeePreset(30)">30g</button>
      </div>

      <div class="setting-row" style="border-top:none; padding-top:2px;">
        <span class="setting-label">Coffee</span>
        <div class="roller-wrap" id="roller-coffee"></div>
      </div>

      <div class="coffee-presets" style="margin-top:6px; margin-bottom:6px;">
        <button class="preset-btn active" id="preset-r15" onclick="setRatioPreset(15)">1:15</button>
        <button class="preset-btn" id="preset-r16" onclick="setRatioPreset(16)">1:16</button>
      </div>

      <div class="setting-row" style="border-top:none; padding-top:2px;">
        <span class="setting-label">Ratio 1:</span>
        <div class="roller-wrap" id="roller-ratio"></div>
      </div>

      <p class="settings-heading">Timing</p>

      <div class="setting-row">
        <span class="setting-label">Bloom</span>
        <div class="roller-wrap" id="roller-bloom"></div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Interval</span>
        <div class="roller-wrap" id="roller-interval"></div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Pours</span>
        <div class="roller-wrap" id="roller-pours"></div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Target</span>
        <div class="roller-wrap" id="roller-brewtotal"></div>
      </div>
    </div>

    <!-- RIGHT: steps -->
    <div>
      <p class="section-label">Pour sequence</p>
      <div class="steps" id="steps"></div>
    </div>

  </div>
</div>

<script>
  // ── Config ──
  const CONFIGS = {
    coffee:    { min: 1,   max: 60,  step: 1,   init: 20,  fmt: v => v + 'g',    itemW: 38 },
    ratio:     { min: 10,  max: 20,  step: 0.5, init: 15,  fmt: v => Number.isInteger(v) ? v : v.toFixed(1), itemW: 34 },
    bloom:     { min: 20,  max: 60,  step: 1,   init: 30,  fmt: v => v + 's',    itemW: 36 },
    interval:  { min: 15,  max: 120, step: 5,   init: 20,  fmt: v => v + 's',    itemW: 40 },
    pours:     { min: 1,   max: 6,   step: 1,   init: 3,   fmt: v => String(v),  itemW: 28 },
    brewtotal: { min: 180, max: 270, step: 5,   init: 210, fmt: v => Math.floor(v/60)+':'+String(v%60).padStart(2,'0'), itemW: 42 },
  };

  const state = {};
  Object.keys(CONFIGS).forEach(k => state[k] = CONFIGS[k].init);

  const rollers = {};

  let timerInterval = null;
  let elapsed = 0;
  let running = false;
  let cueTimes = [];
  let totalDuration = 0;
  let mode = 'hot';
  let numSteps = 0;

  // ── Roller setup ──
  function buildItems(cfg) {
    const arr = [];
    for (let v = cfg.min; v <= cfg.max + 0.0001; v = parseFloat((v + cfg.step).toFixed(4))) {
      if (v <= cfg.max + 0.0001) arr.push(parseFloat(v.toFixed(4)));
    }
    return arr;
  }

  function setupRoller(key) {
    const wrap = document.getElementById('roller-' + key);
    if (!wrap) return;
    const cfg = CONFIGS[key];
    const items = buildItems(cfg);
    const W = cfg.itemW;
    const WRAP_W = 110;

    wrap.innerHTML =
      '<div class="roller-track-outer" id="router-' + key + '">' +
        '<div class="roller-fade-l"></div>' +
        '<div class="roller-center-mark"></div>' +
        '<div class="roller-fade-r"></div>' +
        '<div class="roller-track" id="rtrack-' + key + '"></div>' +
      '</div>';

    const outer = wrap.querySelector('.roller-track-outer');
    const track = wrap.querySelector('.roller-track');

    items.forEach(v => {
      const d = document.createElement('div');
      d.className = 'roller-item';
      d.style.width = W + 'px';
      d.textContent = cfg.fmt(v);
      track.appendChild(d);
    });

    let idx = items.findIndex(v => Math.abs(v - state[key]) < 0.001);
    if (idx < 0) idx = 0;

    function render(animated) {
      const offset = (WRAP_W / 2) - (idx * W) - (W / 2);
      track.style.transition = animated ? 'transform 0.18s ease' : 'none';
      track.style.transform = 'translateX(' + offset + 'px)';
      track.querySelectorAll('.roller-item').forEach((d, i) => d.classList.toggle('sel', i === idx));
      state[key] = items[idx];
      if (key === 'coffee') updateCoffeePresets();
      if (key === 'ratio')  updateRatioPresets();
      renderSteps();
    }

    render(false);

    let startX = null, startIdx = null, lastX = null, velocity = 0, lastT = null;

    function clamp(i) { return Math.max(0, Math.min(items.length - 1, i)); }

    function pStart(x) { startX = x; lastX = x; startIdx = idx; velocity = 0; lastT = Date.now(); }

    function pMove(x) {
      if (startX === null) return;
      const now = Date.now(), dt = now - lastT || 1;
      velocity = (x - lastX) / dt;
      lastX = x; lastT = now;
      idx = clamp(Math.round(startIdx + (startX - x) / W));
      render(false);
    }

    function pEnd() {
      if (startX === null) return;
      // Reduced momentum: multiplier 30 instead of 100, max 2 steps
      const flick = Math.round(-velocity * 30 / W);
      idx = clamp(idx + Math.max(-2, Math.min(2, flick)));
      render(true);
      startX = null;
    }

    outer.addEventListener('mousedown',  e => { pStart(e.clientX); e.preventDefault(); });
    window.addEventListener('mousemove', e => { if (startX !== null) pMove(e.clientX); });
    window.addEventListener('mouseup',   pEnd);

    outer.addEventListener('touchstart', e => { pStart(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
    outer.addEventListener('touchmove',  e => { pMove(e.touches[0].clientX); e.preventDefault(); },  { passive: false });
    outer.addEventListener('touchend',   pEnd);

    outer.addEventListener('wheel', e => {
      idx = clamp(idx + Math.sign(e.deltaY));
      render(true);
      e.preventDefault();
    }, { passive: false });

    rollers[key] = {
      items,
      setVal(v) {
        const i = items.findIndex(x => Math.abs(x - v) < 0.001);
        if (i >= 0) { idx = i; render(true); }
      }
    };
  }

  // ── Coffee presets ──
  function setCoffeePreset(v) { rollers['coffee'] && rollers['coffee'].setVal(v); }

  function updateCoffeePresets() {
    [20, 30].forEach(v => {
      const el = document.getElementById('preset-' + v);
      if (el) el.classList.toggle('active', Math.abs(state.coffee - v) < 0.001);
    });
  }

  // ── Ratio presets ──
  function setRatioPreset(v) { rollers['ratio'] && rollers['ratio'].setVal(v); }

  function updateRatioPresets() {
    [15, 16].forEach(v => {
      const el = document.getElementById('preset-r' + v);
      if (el) el.classList.toggle('active', Math.abs(state.ratio - v) < 0.001);
    });
  }

  // ── Mode ──
  function setMode(m) {
    mode = m;
    document.getElementById('btn-hot').classList.toggle('active', m === 'hot');
    document.getElementById('btn-iced').classList.toggle('active', m === 'iced');
    document.getElementById('callout-ice').style.display = m === 'iced' ? 'flex' : 'none';
    document.getElementById('callout-main-label').textContent = m === 'iced' ? 'Hot water' : 'Total water';
    rollers['coffee'] && rollers['coffee'].setVal(m === 'iced' ? 30 : 20);
    renderSteps();
  }

  // ── Calc ──
  function buildCueTimes() {
    const { bloom, interval, pours, brewtotal } = state;
    totalDuration = brewtotal;
    cueTimes = [0];
    for (let i = 0; i < pours; i++) cueTimes.push(bloom + interval * i);
    numSteps = cueTimes.length;
  }

  function calc() {
    const { coffee, ratio, pours } = state;
    const water = coffee * ratio;
    const bloomG = coffee * 2;
    if (mode === 'iced') {
      const ice = water * 0.4, hotwater = water * 0.6;
      const pourG = (hotwater - bloomG) / pours;
      const targets = [bloomG];
      for (let i = 0; i < pours; i++) targets.push(bloomG + pourG * (i + 1));
      return { water, bloomG, targets, ice, hotwater, isIced: true };
    } else {
      const pourG = (water - bloomG) / pours;
      const targets = [bloomG];
      for (let i = 0; i < pours; i++) targets.push(bloomG + pourG * (i + 1));
      return { water, bloomG, targets, isIced: false };
    }
  }

  function fmt(g) { const n = parseFloat(g); return Number.isInteger(n) ? String(n) : n.toFixed(1); }
  function fmtTime(s) { return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0'); }

  const ORDINALS = ['First','Second','Third','Fourth','Fifth','Sixth'];
  function pourName(i) {
    if (i === 0) return 'Bloom';
    if (i === state.pours) return 'Final pour';
    return ORDINALS[i-1] + ' pour';
  }

  function saveState() {
    try { localStorage.setItem('pourover', JSON.stringify({ ...state, mode })); } catch(e) {}
  }

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem('pourover'));
      if (!saved) return;
      Object.keys(CONFIGS).forEach(k => {
        if (saved[k] !== undefined) state[k] = saved[k];
      });
      if (saved.mode === 'iced') mode = 'iced';
    } catch(e) {}
  }

  function renderSteps() {
    buildCueTimes();
    saveState();
    const v = calc();
    document.getElementById('target-display').textContent = fmtTime(state.brewtotal);
    document.getElementById('total-water').textContent = fmt(v.isIced ? v.hotwater : v.water);
    if (v.isIced) document.getElementById('ice-amount').textContent = fmt(v.ice);

    const container = document.getElementById('steps');
    container.innerHTML = '';

    for (let i = 0; i < numSteps; i++) {
      const title = pourName(i);
      const target = fmt(v.targets[i]);
      const isLast = i === numSteps - 1;
      const unit = i === 0 ? 'g' : (v.isIced && isLast) ? 'g hot water' : 'g total';
      const note = i === 0
        ? 'Saturate all grounds evenly. Wait for next cue.'
        : isLast
          ? (v.isIced ? 'Complete hot water. Allow full drawdown onto ice.' : 'Complete the brew. Allow full drawdown.')
          : 'Pour in slow steady circles.';

      const div = document.createElement('div');
      div.className = 'step'; div.id = 'step-' + i;
      div.innerHTML =
        '<div class="step-header">' +
          '<span class="step-title">' + title + '</span>' +
          '<span class="step-badge">' + target + 'g</span>' +
          '<span class="step-time-badge">' + fmtTime(cueTimes[i]) + '</span>' +
        '</div>' +
        '<div class="step-body"><div class="step-body-inner"><div class="step-body-pad">' +
          '<p class="step-note">' + note + '</p>' +
        '</div></div></div>';
      container.appendChild(div);
    }

    if (v.isIced) {
      const note = document.createElement('div');
      note.className = 'ice-note';
      note.textContent = 'Place ' + fmt(v.ice) + 'g ice in your vessel before brewing.';
      container.appendChild(note);
    }

    applyStepStates(currentActiveStep());
    updateProgressMarkers();
    updatePips(currentActiveStep());
    updateTimerStepInfo(currentActiveStep());
  }

  // ── Timer ──
  function currentActiveStep() {
    let a = -1;
    for (let i = cueTimes.length - 1; i >= 0; i--) { if (elapsed >= cueTimes[i]) { a = i; break; } }
    return a;
  }

  function applyStepStates(active) {
    for (let i = 0; i < numSteps; i++) {
      const el = document.getElementById('step-' + i);
      if (!el) continue;
      el.classList.remove('active', 'done');
      if (i === active) el.classList.add('active');
      else if (i < active) el.classList.add('done');
    }
  }

  const MAX_DURATION = 300; // 5:00 hard stop

  function updateProgressMarkers() {
    const track = document.getElementById('progress-track');
    // remove old markers
    track.querySelectorAll('.step-marker, .progress-target-line').forEach(el => el.remove());

    // target line at totalDuration position
    const targetPct = (totalDuration / MAX_DURATION) * 100;
    const tl = document.createElement('div');
    tl.className = 'progress-target-line';
    tl.style.left = targetPct + '%';
    track.appendChild(tl);

    // step markers at each cue time (skip step 0 = bloom at 0:00, it's the start)
    cueTimes.forEach((t, i) => {
      if (i === 0) return; // skip 0s marker, it's the left edge
      const pct = (t / MAX_DURATION) * 100;
      const dot = document.createElement('div');
      dot.className = 'step-marker';
      dot.id = 'smark-' + i;
      dot.style.left = pct + '%';
      track.appendChild(dot);
    });
  }

  function updateMarkerStates(activeStep) {
    cueTimes.forEach((t, i) => {
      if (i === 0) return;
      const dot = document.getElementById('smark-' + i);
      if (!dot) return;
      dot.classList.remove('reached', 'current');
      if (i < activeStep)       dot.classList.add('reached');
      else if (i === activeStep) dot.classList.add('current');
    });
  }

  function updatePips(activeStep) {
    const pip = document.getElementById('step-pip');
    pip.innerHTML = '';
    for (let i = 0; i < numSteps; i++) {
      const d = document.createElement('div');
      d.className = 'step-pip-dot';
      if (i < activeStep)       d.classList.add('done');
      else if (i === activeStep) d.classList.add('active');
      pip.appendChild(d);
    }
  }

  function setLabel(text, lit) {
    const le = document.getElementById('timer-label');
    const lt = document.getElementById('timer-label-text');
    lt.textContent = text;
    le.classList.toggle('lit', !!lit);
  }

  function flashCue(label) {
    const te = document.getElementById('timer');
    te.classList.add('cue');
    setLabel(label, true);
    setTimeout(() => { te.classList.remove('cue'); setLabel(running ? 'brewing\u2026' : 'ready', false); }, 900);
  }

  function updateTimerStepInfo(activeStep) {
    const el = document.getElementById('timer-step-info');
    const nx = document.getElementById('tsi-next-line');
    if (!el) return;

    if (!running && elapsed === 0) {
      const v = calc();
      el.innerHTML =
        '<span class="tsi-name">Bloom</span>' +
        '<span class="tsi-target">' + fmt(v.bloomG) + '<span class="tsi-unit">g</span></span>';
      if (nx) nx.innerHTML = '';
      return;
    }

    if (activeStep < 0 || activeStep >= numSteps) {
      el.innerHTML = '';
      if (nx) nx.innerHTML = '';
      return;
    }

    const v = calc();
    const name = pourName(activeStep);
    const target = fmt(v.targets[activeStep]);
    const isLast = activeStep === numSteps - 1;
    const unit = activeStep === 0 ? 'g' : (v.isIced && isLast) ? 'g hot' : 'g';

    el.innerHTML =
      '<span class="tsi-name">' + name + '</span>' +
      '<span class="tsi-target">' + target + '<span class="tsi-unit">' + unit + '</span></span>';

    if (nx) {
      if (activeStep < numSteps - 1) {
        const nextName = pourName(activeStep + 1);
        const nextTime = fmtTime(cueTimes[activeStep + 1]);
        nx.textContent = nextName + ' @ ' + nextTime;
      } else {
        nx.textContent = '';
      }
    }
  }

  function updateTimer() {
    const te = document.getElementById('timer');
    const remaining = totalDuration - elapsed;

    te.textContent = fmtTime(elapsed);
    // progress fills relative to MAX_DURATION so it keeps moving past target
    document.getElementById('progress').style.width = Math.min((elapsed / MAX_DURATION) * 100, 100) + '%';

    const active = currentActiveStep();
    applyStepStates(active);
    updateMarkerStates(active);
    updatePips(active);
    updateTimerStepInfo(active);

    // Hard stop at 5:00
    if (elapsed >= MAX_DURATION) {
      clearInterval(timerInterval); running = false;
      document.getElementById('btn-start').textContent = 'Done';
      te.classList.add('cue');
      setLabel('done.', true);
      return;
    }

    // Target time crossed — flash but keep going
    if (elapsed === totalDuration) {
      te.classList.add('cue');
      setLabel('on time \u2014 let it drain', true);
      setTimeout(() => { te.classList.remove('cue'); setLabel('draining\u2026', false); }, 1800);
      return;
    }

    // Pour cues
    if (elapsed > 0 && cueTimes.includes(elapsed)) {
      flashCue('\u2192 ' + pourName(cueTimes.indexOf(elapsed)));
      return;
    }

    // End-approach cues (relative to target)
    if (remaining === 30 || remaining === 10) {
      flashCue(remaining + 's remaining');
      return;
    }

    // Post-target running state
    if (elapsed > totalDuration) {
      te.classList.remove('cue');
      setLabel('draining\u2026', false);
      return;
    }

    te.classList.remove('cue');
    setLabel(running ? 'brewing\u2026' : 'ready', false);
  }

  function startStop() {
    if (elapsed >= MAX_DURATION) return;
    if (running) {
      clearInterval(timerInterval); running = false;
      document.getElementById('btn-start').textContent = 'Resume';
      setLabel('paused', false);
    } else {
      running = true;
      document.getElementById('btn-start').textContent = 'Pause';
      timerInterval = setInterval(() => { elapsed++; updateTimer(); }, 1000);
    }
  }

  function reset() {
    clearInterval(timerInterval); running = false; elapsed = 0;
    document.getElementById('btn-start').textContent = 'Start';
    const te = document.getElementById('timer');
    te.textContent = '0:00'; te.classList.remove('cue');
    setLabel('ready', false);
    document.getElementById('progress').style.width = '0%';
    updateMarkerStates(-1);
    updatePips(-1);
    updateTimerStepInfo(-1);
    for (let i = 0; i < numSteps; i++) {
      const el = document.getElementById('step-' + i);
      if (el) el.classList.remove('active', 'done');
    }
  }

  document.getElementById('btn-start').addEventListener('click', startStop);
  document.getElementById('btn-reset').addEventListener('click', reset);

  // ── Presets (chip-based) ──
  const PRESET_KEY = 'pourover_presets';

  function loadPresets() {
    try { return JSON.parse(localStorage.getItem(PRESET_KEY)) || []; } catch(e) { return []; }
  }

  function savePresets(list) {
    try { localStorage.setItem(PRESET_KEY, JSON.stringify(list)); } catch(e) {}
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderChips() {
    const list = loadPresets();
    const strip = document.getElementById('chip-strip');
    const addBtn = document.getElementById('chip-add');
    // remove existing chips (not the add button)
    strip.querySelectorAll('.recipe-chip').forEach(el => el.remove());
    list.forEach((p, i) => {
      const chip = document.createElement('div');
      chip.className = 'recipe-chip';
      chip.dataset.idx = i;
      chip.innerHTML =
        '<span class="chip-name">' + escHtml(p.name) + '</span>' +
        '<span class="chip-del" data-idx="' + i + '">✕</span>';
      chip.addEventListener('click', (e) => {
        if (e.target.classList.contains('chip-del')) {
          deletePreset(parseInt(e.target.dataset.idx));
        } else {
          applyPreset(p, chip);
        }
      });
      strip.insertBefore(chip, addBtn);
    });
  }

  function applyPreset(p, chipEl) {
    Object.keys(CONFIGS).forEach(k => {
      if (p[k] !== undefined) state[k] = p[k];
    });
    if (p.mode) {
      mode = p.mode;
      document.getElementById('btn-hot').classList.toggle('active', mode === 'hot');
      document.getElementById('btn-iced').classList.toggle('active', mode === 'iced');
      document.getElementById('callout-ice').style.display = mode === 'iced' ? 'flex' : 'none';
      document.getElementById('callout-main-label').textContent = mode === 'iced' ? 'Hot water' : 'Total water';
    }
    Object.keys(CONFIGS).forEach(k => rollers[k] && rollers[k].setVal(state[k]));
    // highlight active chip
    document.querySelectorAll('.recipe-chip').forEach(c => c.classList.remove('active'));
    if (chipEl) chipEl.classList.add('active');
  }

  function saveChipPreset() {
    const input = document.getElementById('chip-input');
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    const list = loadPresets();
    list.push({ name, ...state, mode, savedAt: Date.now() });
    savePresets(list);
    input.value = '';
    chipSaveOpen = false;
    document.getElementById('chip-save-row').classList.remove('open');
    renderChips();
    // auto-highlight newly saved chip
    const chips = document.querySelectorAll('.recipe-chip');
    if (chips.length) {
      document.querySelectorAll('.recipe-chip').forEach(c => c.classList.remove('active'));
      chips[chips.length - 1].classList.add('active');
    }
  }

  function deletePreset(i) {
    const list = loadPresets();
    list.splice(i, 1);
    savePresets(list);
    renderChips();
  }

  let chipSaveOpen = false;
  function toggleChipSave() {
    chipSaveOpen = !chipSaveOpen;
    document.getElementById('chip-save-row').classList.toggle('open', chipSaveOpen);
    if (chipSaveOpen) setTimeout(() => document.getElementById('chip-input').focus(), 220);
  }

  loadState();
  // apply saved mode to UI
  document.getElementById('btn-hot').classList.toggle('active', mode === 'hot');
  document.getElementById('btn-iced').classList.toggle('active', mode === 'iced');
  document.getElementById('callout-ice').style.display = mode === 'iced' ? 'flex' : 'none';
  document.getElementById('callout-main-label').textContent = mode === 'iced' ? 'Hot water' : 'Total water';
  Object.keys(CONFIGS).forEach(setupRoller);
  renderSteps();
  renderChips();
</script>

<script>
  document.getElementById('chip-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveChipPreset();
  });
</script>

</body>
</html>
